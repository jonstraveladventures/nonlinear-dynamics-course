{{ define "main" }}
<article class="notebook-page">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
  </header>

  <div class="page-nav">
    {{ with .NextInSection }}
      <a class="prev-next" href="{{ .RelPermalink }}">← {{ .LinkTitle }}</a>
    {{ end }}
    {{ with .PrevInSection }}
      <a class="prev-next next" href="{{ .RelPermalink }}">{{ .LinkTitle }} →</a>
    {{ end }}
  </div>

  <div class="notebook-content">
    {{ .Content }}
  </div>

  <div class="page-nav bottom">
    {{ with .NextInSection }}
      <a class="prev-next" href="{{ .RelPermalink }}">← {{ .LinkTitle }}</a>
    {{ end }}
    {{ with .PrevInSection }}
      <a class="prev-next next" href="{{ .RelPermalink }}">{{ .LinkTitle }} →</a>
    {{ end }}
  </div>
</article>
{{ end }}
